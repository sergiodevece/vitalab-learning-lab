<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Meter</title>
    <style>
      :root {
        color-scheme: dark;
        --meter-color: #10b981;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #1f2937, #030712 70%);
        color: #f9fafb;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      body.fullscreen {
        padding: 0;
      }

      .card {
        width: min(92vw, 520px);
        padding: 24px;
        border-radius: 20px;
        background: rgba(17, 24, 39, 0.95);
        box-shadow: 0 16px 45px rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      body.fullscreen .card {
        width: 100%;
        height: 100%;
        border-radius: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 12px;
        font-size: 1.4rem;
      }

      .controls {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 10px 16px;
        font-size: 0.95rem;
        cursor: pointer;
        background: #3b82f6;
        color: white;
      }

      button:disabled {
        opacity: 0.7;
        cursor: default;
      }

      .meter-shell {
        margin: 14px 0 8px;
      }

      .meter-label {
        display: flex;
        justify-content: space-between;
        font-size: 0.9rem;
        color: #d1d5db;
        margin-bottom: 6px;
        gap: 10px;
      }

      .meter {
        width: 100%;
        height: 24px;
        background: #374151;
        border-radius: 999px;
        overflow: hidden;
        position: relative;
      }

      .fill {
        height: 100%;
        width: 0%;
        background: var(--meter-color);
        transition: width 0.08s linear, background 0.2s ease;
      }

      .peak {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 2px;
        background: white;
        opacity: 0.9;
        transform: translateX(-50%);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }

      .stat {
        padding: 10px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
      }

      .stat strong {
        display: block;
        font-size: 1rem;
        margin-top: 4px;
      }

      .clip-indicator {
        margin-top: 10px;
        padding: 8px 10px;
        border-radius: 999px;
        display: inline-block;
        font-size: 0.9rem;
        background: rgba(16, 185, 129, 0.15);
        color: #86efac;
      }

      .clip-indicator.active {
        background: rgba(59, 130, 246, 0.15);
        color: #93c5fd;
      }

      .clip-indicator.hot {
        background: rgba(245, 158, 11, 0.16);
        color: #fde68a;
      }

      .clip-indicator.clipping {
        background: rgba(239, 68, 68, 0.18);
        color: #fecaca;
      }

      canvas {
        width: 100%;
        height: 130px;
        margin-top: 16px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      body.fullscreen canvas {
        flex: 1;
        height: auto;
        min-height: 220px;
      }

      .privacy {
        margin-top: 12px;
        font-size: 0.82rem;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Audio Meter Studio</h1>
      <div class="controls">
        <button id="startBtn">Start microphone</button>
        <button id="stopBtn" disabled>Stop microphone</button>
        <button id="toggleViewBtn">Switch to spectrum</button>
        <button id="fullscreenBtn">Fullscreen view</button>
      </div>

      <div class="meter-shell">
        <div class="meter-label">
          <span>Input level</span>
          <span id="statusText">Idle</span>
        </div>
        <div class="meter">
          <div class="fill" id="fill"></div>
          <div class="peak" id="peak"></div>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <span>Level</span>
          <strong id="levelValue">0%</strong>
        </div>
        <div class="stat">
          <span>Peak hold</span>
          <strong id="peakValue">0%</strong>
        </div>
        <div class="stat">
          <span>dBFS</span>
          <strong id="dbValue">-∞ dBFS</strong>
        </div>
      </div>

      <div class="clip-indicator safe" id="clipIndicator">Safe</div>
      <canvas id="visualizer" width="600" height="220"></canvas>
      <div class="privacy">Audio is analyzed in real time. Nothing is recorded or uploaded.</div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
